<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon | May 1st Launch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --purple: #fff9d9;
      --orange: #73010b;
      --bg-dark: #09090b;
      --glass: rgba(255, 255, 255, 0.03);
      --stroke: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-dark);
      color: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .bg-canvas {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: 
        radial-gradient(circle at 20% 30%, rgba(168, 85, 247, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(255, 122, 24, 0.08) 0%, transparent 40%);
      filter: blur(80px);
      z-index: -1;
    }

    .panel {
      position: relative;
      width: 1000px;
      max-width: 92vw;
      padding: 40px;
      border-radius: 32px;
      background: var(--glass);
      backdrop-filter: blur(24px);
      border: 1px solid var(--stroke);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    /* Countdown Styling */
    .countdown-container {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .timer-unit {
      text-align: left;
    }

    .timer-val {
      font-family: 'JetBrains+Mono', monospace;
      font-size: 32px;
      font-weight: 800;
      display: block;
      color: #fff;
    }

    .timer-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #71717a;
    }

    /* Progress Bar */
    .progress-section {
      margin-bottom: 40px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 8px;
      color: #a1a1aa;
    }

    .progress-track {
      height: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--stroke);
    }

    .progress-fill {
      height: 100%;
      width: 0%; /* Updated by JS */
      background: linear-gradient(90deg, var(--purple), var(--orange));
      box-shadow: 0 0 15px var(--purple);
      transition: width 1s ease-in-out;
    }

    /* Layout Content */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .brand { font-weight: 800; font-size: 24px; letter-spacing: -0.02em; }
    
    .grid { display: grid; grid-template-columns: 1fr 340px; gap: 30px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-content: start; }

    .card { 
      border: 1px solid var(--stroke); 
      border-radius: 20px; padding: 20px; 
      background: rgba(255,255,255, 0.02); 
    }

    .card-label { color: #71717a; font-size: 10px; text-transform: uppercase; margin-bottom: 4px; display: block; }
    .card-val { font-size: 14px; font-weight: 500; }

    .game-container { border-radius: 24px; overflow: hidden; border: 1px solid var(--stroke); }
    canvas { display: block; width: 100%; background: #050505; }

    .footer { display: flex; justify-content: space-between; margin-top: 24px; color: #71717a; font-size: 12px; }

    @media(max-width:850px){ 
      .grid { grid-template-columns: 1fr; }
      .countdown-container { gap: 10px; }
      .timer-val { font-size: 24px; }
    }
  </style>
</head>
<body>

  <div class="bg-canvas"></div>

  <div class="panel">
    <div class="header">
      <div class="brand">AbSa<span style="color:var(--orange)"> Studio</span></div>
      <div style="font-size: 20x; font-weight: 500; color: var(--purple);">LAUNCHING THIS MAY</div>
    </div>

    <div class="countdown-container" id="countdown">
      <div class="timer-unit"><span class="timer-val" id="days">00</span><span class="timer-label">Days</span></div>
      <div class="timer-unit"><span class="timer-val" id="hours">00</span><span class="timer-label">Hrs</span></div>
      <div class="timer-unit"><span class="timer-val" id="minutes">00</span><span class="timer-label">Min</span></div>
      <div class="timer-unit"><span class="timer-val" id="seconds">00</span><span class="timer-label">Sec</span></div>
    </div>

    <div class="progress-section">
      <div class="progress-meta">
        <span>System Deployment</span>
        <span id="progress-text">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-bar"></div>
      </div>
    </div>

    <div class="grid">
      <div class="info-grid">
        <div class="card"><span class="card-label">Focus</span>Video Editing & Photo Editing</div>
        <div class="card"><span class="card-label">Things Will be Seen</span>Motion Graphics ,Tutorials ,Hacks ,etc</div>
        <div class="card"><span class="card-label">Current Phase</span>Building Channel</div>
        <div class="card"><span class="card-label">Visibility Status</span>Offline</div>
      </div>
      
      <div class="game-container">
        <canvas id="gameCanvas" width="340" height="300"></canvas>
      </div>
    </div>

    <div class="footer">
      <div>Play to pass time: Space/Tap</div>
      <div>Score: <span id="score" style="color:var(--orange); font-weight: 800;">0</span></div>
    </div>
  </div>

  <script>
    // --- COUNTDOWN & PROGRESS LOGIC ---
  const launchDate = new Date("May 1, 2026 00:00:00").getTime();
  const startDate = new Date("Jan 1, 2026 00:00:00").getTime();

  function updateCountdown() {
    const now = new Date().getTime();
    const distance = launchDate - now;

    // Time calculations
    const d = Math.floor(distance / (1000 * 60 * 60 * 24));
    const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("days").innerText = d.toString().padStart(2, '0');
    document.getElementById("hours").innerText = h.toString().padStart(2, '0');
    document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
    document.getElementById("seconds").innerText = s.toString().padStart(2, '0');

    // ✅ NEW PROGRESS LOGIC (based on time LEFT)
    const totalDuration = launchDate - startDate;
    const timeLeft = launchDate - now;

    let progress = 100 - Math.floor((timeLeft / totalDuration) * 100);
    progress = Math.max(0, Math.min(100, progress)); // clamp

    document.getElementById("progress-bar").style.width = progress + "%";
    document.getElementById("progress-text").innerText = progress + "%";
  }

  setInterval(updateCountdown, 1000);
  updateCountdown();

    // --- GAME LOGIC (Simplified for the new height) ---
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    let player = { x: 40, y: 150, size: 14, velocity: 0 };
    let gravity = 0.25;
    let jump = -4.5;
    let obstacles = [];
    let frame = 0, score = 0, running = false;

    function reset() {
      player.y = 150; player.velocity = 0;
      obstacles = []; score = 0; frame = 0; running = false;
      document.getElementById("score").innerText = score;
    }

    function gameLoop() {
      requestAnimationFrame(gameLoop);
      ctx.clearRect(0,0,canvas.width,canvas.height);

      if(!running) {
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.font = "bold 16px sans-serif";
        ctx.fillText("CLICK TO PLAY", canvas.width/2, canvas.height/2);
        return;
      }

      player.velocity += gravity;
      player.y += player.velocity;
      ctx.fillStyle = "#a855f7";
      ctx.fillRect(player.x, player.y, player.size, player.size);

      if(frame % 90 === 0) {
        let gap = 100;
        let top = 30 + Math.random() * (canvas.height - gap - 60);
        obstacles.push({ x: canvas.width, top, bottom: top + gap });
      }

      obstacles.forEach(obs => {
        obs.x -= 2;
        ctx.fillStyle = "#ff7a18";
        ctx.fillRect(obs.x, 0, 25, obs.top);
        ctx.fillRect(obs.x, obs.bottom, 25, canvas.height);

        if(player.x < obs.x + 25 && player.x + 14 > obs.x && (player.y < obs.top || player.y + 14 > obs.bottom)) running = false;
        if(obs.x === player.x) { score++; document.getElementById("score").innerText = score; }
      });
      
      obstacles = obstacles.filter(o => o.x > -30);
      if(player.y > canvas.height || player.y < 0) running = false;
      frame++;
    }

    canvas.addEventListener("mousedown", () => { if(!running) reset(); running = true; player.velocity = jump; });
    reset(); gameLoop();
  </script>
</body>
</html>
